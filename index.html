<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية اللغات | الصفحة الرئيسية</title>
    <style>
        :root {
            --primary-purple: #6f42c1;
            --light-purple: #f3e8ff;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex; /* عشان نوسطن المحتوى */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
        }
        .main-container {
            width: 90%;
            max-width: 1000px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 8px solid var(--primary-purple);
        }
        h1 { color: var(--primary-purple); margin-bottom: 30px; }
        .levels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .level-card {
            background: var(--light-purple);
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--primary-purple);
            font-weight: bold;
            font-size: 20px;
            transition: 0.3s;
            border: 2px solid transparent;
        }
        .level-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-purple);
            background: white;
        }
        .footer { margin-top: 40px; color: #777; font-size: 14px; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>أكاديمية اللغات التعليمية 🎓</h1>
    <p>اختر المستوى أو الحلقة لتبدأ التعلم</p>

    <div class="levels-grid">
        <a href="level-a1/index.html" class="level-card">
            📺 المستوى الأول (Level A1)
        </a>

        <a href="level-a1/muzzy-series/episode-02/scene-01/index.html" class="level-card">
            🎬 كورس Muzzy - الحلقة الثانية
        </a>
    </div>

    <div class="footer">
        <p>Created by: Hisham Embabay</p>
    </div>
</div>

</body>
</html>
